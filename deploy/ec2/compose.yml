services:
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${KWAIL_SHARED_DIR}/runtime.env
      - ${KWAIL_SHARED_DIR}/secrets.env
    environment:
      KWAIL_PROJECT_ROOT: /app
    volumes:
      - ${KWAIL_SHARED_DIR}/data:/app/data

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ../../apps/web/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
